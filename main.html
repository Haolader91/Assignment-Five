<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- title and fav-icons -->
    <title>GitHub Issues Tracker</title>
    <link
      rel="shortcut icon"
      href="./assets/github-logo.png"
      type="image/x-icon"
    />

    <!-- font use  -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <!-- tailwindcss + daisyui  -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- font-awesome icons  -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <!-- css link  -->
    <link rel="stylesheet" href="./style/style.css" />
  </head>
  <body>
    <!-- navbar section  -->
    <header>
      <nav>
        <div class="navbar bg-base-100 shadow-sm px-20">
          <div class="flex items-center flex-1">
            <img src="./assets/github-logo.png" alt="" class="w-12" />
            <p class="text-3xl font-bold pl-3">GitHub Issues Tracker</p>
          </div>
          <div class="flex gap-2">
            <div class="input outline-none">
              <i class="fa-solid fa-plus"></i>
              <input type="text" placeholder="Search" class="md:w-auto" />
            </div>
            <button class="btn btn-primary">Search</button>
          </div>
        </div>
      </nav>
    </header>

    <!-- main section  -->
    <main class="container mx-auto bg-base-100 shadow rounded-xl px-5">
      <!-- tabs section -->
      <section>
        <div class="flex gap-4 m-5 py-6">
          <button class="btn btn-primary" onclick="loadIssues('all', this)">
            All
          </button>
          <button class="btn" onclick="loadIssues('open', this)">Open</button>
          <button class="btn" onclick="loadIssues('closed', this)">
            Closed
          </button>
        </div>
      </section>

      <!-- issues counting section  -->
      <section>
        <div class="flex justify-between mb-5">
          <div class="flex items-center gap-2">
            <div class="bg-[#ECE4FF] rounded-full p-2">
              <img src="./assets/Aperture.png" alt="" />
            </div>

            <div>
              <span id="issueCount" class="font-semibold"></span><br />
              <span>Track and manage your project issues</span>
            </div>
          </div>
          <div class="text-sm">
            <span class="text-green-600">● Open</span>

            <span class="ml-4 text-purple-600">● Closed</span>
          </div>
        </div>
      </section>

      <!-- card section  -->
      <section>
        <div id="issues" class="grid lg:grid-cols-4 md:grid-cols-2 gap-5"></div>
      </section>

      <!-- modal section  -->
      <dialog id="my_modal_5" class="modal modal-bottom sm:modal-middle">
        <div class="modal-box">
          <div id="modal-box"></div>

          <div class="modal-action">
            <form method="dialog">
              
              <div class="card-actions justify-end mt-6">
                <button
                  class="btn btn-primary bg-[#6366f1] hover:bg-[#4f46e5] border-none px-10 text-lg normal-case">
                  Close
                </button>
              </div>
            </form>
          </div>
        </div>
      </dialog>
    </main>

    <script src="./script/index.js"></script>
  </body>
</html>
